server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Inject runtime config (API URL is set via env var at container startup)
    location /config.js {
        default_type application/javascript;
        return 200 'window.__LORO_CONFIG__={API_URL:"$BACKEND_URL"};';
    }
}
