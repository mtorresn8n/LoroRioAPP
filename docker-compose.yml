version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: loroapp
      POSTGRES_USER: loroapp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-loroapp_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loroapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://loroapp:${DB_PASSWORD:-loroapp_secret}@db:5432/loroapp
      MEDIA_PATH: /app/media
      CORS_ORIGINS: '["http://localhost:80", "http://localhost:5173"]'
      AUTH_USER: ${AUTH_USER:-mtorres}
      AUTH_PASS: ${AUTH_PASS:-Password01}
    volumes:
      - media_data:/app/media
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  media_data:
